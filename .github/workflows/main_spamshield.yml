# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - spamshieldai

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
        
      # Optional: Add step to run tests here (PyTest, Django test suites, etc.)

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !venv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0254DC0005C44C56A6D236E08A24F716 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BC49B0FDE2CE4E689FD76951812DEA24 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9556AA34B40E451BBDD306A6134C0A9B }}

      - name: Configure App Service Python runtime and startup command
        run: |
          RG_NAME=$(az webapp list --query "[?name=='Spamshield'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG_NAME" ]; then
            echo "Could not find resource group for app: Spamshield"
            exit 1
          fi

          az webapp config set \
            --name Spamshield \
            --resource-group "$RG_NAME" \
            --linux-fx-version "PYTHON|3.12" \
            --startup-file "gunicorn -k uvicorn.workers.UvicornWorker --bind=0.0.0.0 --timeout 600 main:app"

          az webapp config appsettings set \
            --name Spamshield \
            --resource-group "$RG_NAME" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true ENABLE_ORYX_BUILD=true

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'Spamshield'
          slot-name: 'Production'
          
